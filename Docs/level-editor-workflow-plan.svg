  <text class="blue h2" x="1368" y="526">Selected: Wall_01</text>
  <text class="muted small" x="1368" y="560">Name</text>
  <rect class="chipOn" x="1368" y="572" width="292" height="34" rx="5"/>
  <text class="text small" x="1386" y="595">Wall_01</text>
