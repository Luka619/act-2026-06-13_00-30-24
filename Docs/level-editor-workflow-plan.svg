  <rect class="panel3" x="1346" y="1036" width="344" height="86" rx="8"/>
  <text class="green h2" x="1368" y="1070">Playtest Snapshot</text>
  <text class="muted small" x="1368" y="1102">Spawn: PlayerSpawn_A | Dummy: 3 | Build: Scene</text>

  <!-- bottom implementation order -->
  <rect class="panel shadow" x="56" y="1210" width="1688" height="50" rx="10"/>
  <text class="text body" x="84" y="1242">推荐落地顺序：Level Browser + Scene Brush -> Selection Inspector -> Gameplay Markers -> Validate Issue List -> Playtest Runtime Preview</text>

  <!-- callouts -->
  <path class="lineGreen" d="M382 752 C444 714, 490 682, 566 672"/>
  <text class="green small" x="404" y="720">Brush 拖入 Scene</text>
  <path class="lineYellow" d="M1008 884 C1144 842, 1242 834, 1346 854"/>
