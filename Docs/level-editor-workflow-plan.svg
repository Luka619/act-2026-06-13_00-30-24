  <text class="text tiny" x="1384" y="870">Missing enemy spawn in combat zone</text>
  <rect class="chipYellow" x="1368" y="892" width="292" height="34" rx="5"/>
  <text class="text tiny" x="1384" y="914">Wall_03 floating 0.3m</text>
