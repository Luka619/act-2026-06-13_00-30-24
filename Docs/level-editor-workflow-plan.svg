  </g>

  <!-- placed content -->
  <rect class="wall" x="566" y="640" width="210" height="66" rx="2"/>
  <text class="text small" x="622" y="680">Wall_01</text>
  <circle class="handle" cx="566" cy="673" r="8"/>
  <circle class="handle" cx="776" cy="673" r="8"/>
  <circle class="handle" cx="671" cy="640" r="8"/>
  <circle class="handle" cx="671" cy="706" r="8"/>

  <rect class="block" x="896" y="678" width="156" height="96" rx="2"/>
  <text class="text small" x="930" y="732">Cover</text>

  <rect class="trigger" x="690" y="804" width="320" height="178" rx="8"/>
  <text class="text small" x="764" y="894">Combat Zone Trigger</text>

  <circle class="spawn" cx="552" cy="904" r="26"/>
  <path d="M552 904 L552 860" stroke="#bdedcb" stroke-width="4"/>
  <text class="text small" x="488" y="950">Player Spawn</text>

  <rect class="enemy" x="1068" y="610" width="62" height="62" rx="31"/>
  <text class="text tiny" x="1050" y="692">Enemy Dummy</text>

  <rect class="hazard" x="1090" y="930" width="116" height="44" rx="2"/>
  <text class="text tiny" x="1116" y="958">Kill Zone</text>

  <!-- right click menu in scene -->
  <rect class="panel shadow" x="1018" y="764" width="236" height="178" rx="6"/>
  <text class="text small" x="1038" y="795">RMB Context</text>
  <line x1="1038" y1="810" x2="1234" y2="810" stroke="#66717c"/>
  <text class="muted small" x="1038" y="838">Create Brush Here</text>
  <text class="muted small" x="1038" y="868">Duplicate Selected</text>
  <text class="muted small" x="1038" y="898">Convert To...</text>
  <text class="muted small" x="1038" y="928">Add Gameplay Marker</text>

  <!-- bottom HUD -->
  <rect class="chip" x="460" y="1096" width="802" height="34" rx="5"/>
  <text class="muted small" x="482" y="1119">LMB 选/拖 | Empty LMB 放置 | RMB 上下文 | Shift 约束轴 | Ctrl 拖拽复制 | Alt 保留 Unity 相机</text>

  <!-- right inspector / validate -->
  <rect class="panel2" x="1320" y="394" width="396" height="760" rx="8"/>
  <text class="text h1" x="1346" y="432">右侧：Selection / Validate</text>
  <text class="muted small" x="1346" y="462">默认显示选中对象；切 Validate 后显示问题列表和一键定位。</text>

