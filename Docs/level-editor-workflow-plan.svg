    <line class="grid2" x1="462" y1="824" x2="1264" y2="824"/>
    <line class="grid" x1="462" y1="874" x2="1264" y2="874"/>
    <line class="grid" x1="462" y1="924" x2="1264" y2="924"/>
    <line class="grid2" x1="462" y1="974" x2="1264" y2="974"/>
    <line class="grid" x1="462" y1="1024" x2="1264" y2="1024"/>

    <line class="grid" x1="512" y1="544" x2="512" y2="1074"/>
    <line class="grid" x1="562" y1="544" x2="562" y2="1074"/>
    <line class="grid2" x1="612" y1="544" x2="612" y2="1074"/>
    <line class="grid" x1="662" y1="544" x2="662" y2="1074"/>
    <line class="grid" x1="712" y1="544" x2="712" y2="1074"/>
    <line class="grid2" x1="762" y1="544" x2="762" y2="1074"/>
